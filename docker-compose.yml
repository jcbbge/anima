services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: anima-postgres
    environment:
      POSTGRES_DB: anima
      POSTGRES_USER: anima
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anima_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    ports:
      - "7101:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anima"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anima-network
    restart: unless-stopped

  api:
    build: .
    container_name: anima-api
    environment:
      DATABASE_URL: postgres://anima:${POSTGRES_PASSWORD:-anima_dev_password}@postgres:5432/anima
      ENCODER_URL: http://ollama:11434
      ENCODER_MODEL: nomic-embed-text
    ports:
      - "7100:7100"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - anima-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: anima-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "7102:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anima-network
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull nomic-embed-text
        wait

volumes:
  postgres_data:
  ollama_data:

networks:
  anima-network:
    driver: bridge
